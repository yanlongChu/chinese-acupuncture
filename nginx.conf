# ============================================================================
# 中医针灸 3D 穴位系统 Nginx 配置示例
# 作用：托管 dist 静态文件 + 针对大模型文件优化传输
# 用法：把 dist/ 上传到服务器（如 /var/www/acu/dist），按需修改 root 与 server_name
# ============================================================================

server {
    listen       80;
    server_name  your-domain.com;      # ← 改成你的域名或 IP

    root  /var/www/acu/dist;           # ← 改成你 dist 的实际路径
    index index.html;

    # ---- 通用 gzip 压缩（对 JS/CSS 效果好，对已压缩的 glb/wasm 几乎无增益但不碍事）----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        model/gltf-binary
        application/octet-stream;

    # ---- HTML：不缓存，保证发版即时生效 ----
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ---- 带 hash 的 JS/CSS：永久强缓存（文件名变就自动失效）----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- DRACO 解码器：体积小、内容稳定，长期缓存 ----
    location /draco/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # wasm 必须用正确 MIME，否则浏览器拒绝编译
        types {
            application/wasm wasm;
            application/javascript js;
        }
    }

    # ---- 3D 模型（核心优化点）----
    # DRACO 压缩后约 20MB。重点不是再 gzip（二进制已压缩），而是：
    #   1) 强缓存：二次访问直接走浏览器缓存，秒开
    #   2) 允许 Range 请求：传输中断可断点续传，不必从头重来
    #   3) 正确 MIME：部分浏览器/工具按 MIME 处理
    location ~* \.glb$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
        default_type model/gltf-binary;
    }

    # ---- SPA 回退：所有未匹配路由都回 index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
